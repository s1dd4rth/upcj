# ─────────────────────────────────────────────────────────────────────────────
# pwa.yml — CI for the UPCJ demo PWA
#
# This workflow is the PR gate for changes under pwa/: it builds the engine
# (required because pwa consumes it via file:../engine), installs the PWA,
# runs the vitest suite, and verifies the Vite build still produces a clean
# dist/.
#
# DEPLOY is owned by .github/workflows/pages.yml, which runs on every push
# to main and bundles the built PWA together with the landing page + assets
# into a single GitHub Pages artifact.
# ─────────────────────────────────────────────────────────────────────────────
name: pwa

on:
  push:
    branches: [main]
    paths:
      - "pwa/**"
      - "engine/**"
      - "spec/**"
      - "framework/**"
      - ".github/workflows/pwa.yml"
    tags: ["pwa-v*"]
  pull_request:
    paths:
      - "pwa/**"
      - "engine/**"
      - "spec/**"
      - "framework/**"
      - ".github/workflows/pwa.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            pwa/package-lock.json
            engine/package-lock.json

      # pwa's package.json has "@upcj/engine": "file:../engine".
      # npm ci copies the file: dep into node_modules, so the engine's dist/
      # must already exist before `cd pwa && npm ci` runs.
      - name: Build engine
        working-directory: engine
        run: npm ci && npm run build

      - name: Install PWA deps
        working-directory: pwa
        run: npm ci

      - name: Run PWA tests
        working-directory: pwa
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            pwa/package-lock.json
            engine/package-lock.json

      - name: Build engine
        working-directory: engine
        run: npm ci && npm run build

      - name: Install PWA deps
        working-directory: pwa
        run: npm ci

      - name: Vite build
        working-directory: pwa
        run: npm run build
