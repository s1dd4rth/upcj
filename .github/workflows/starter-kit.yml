name: starter-kit

on:
  push:
    branches: [main]
    paths:
      - "starter-kit/**"
      - "framework/**"
      - ".github/workflows/starter-kit.yml"
    tags: ["starter-kit-v*"]
  pull_request:
    paths:
      - "starter-kit/**"
      - "framework/**"

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: starter-kit
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: starter-kit/package-lock.json

      # Puppeteer skips the Chrome download (the script's .puppeteerrc.cjs also
      # enforces this). We install the distro chromium-browser for pa11y and
      # axe-core CLI to drive.
      - name: Install system Chromium for axe/pa11y
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          echo "PUPPETEER_EXECUTABLE_PATH=$(command -v chromium-browser)" >> "$GITHUB_ENV"

      - name: Install npm deps
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Generate HTML
        run: npm run build

      - name: Accessibility gates (axe + pa11y)
        run: npm run a11y

      - name: Build tagged PDF (Chromium via Playwright + pikepdf)
        run: ./scripts/build-pdfs.sh

      - name: Validate PDF/UA-1 (veraPDF)
        run: ./scripts/validate-pdfs.sh

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: starter-kit-pdf
          path: starter-kit/dist/upcj-starter-kit.pdf
          if-no-files-found: error

      - name: Upload HTML preview as artifact
        uses: actions/upload-artifact@v4
        with:
          name: starter-kit-html
          path: starter-kit/dist/html
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/starter-kit-v')
    needs: build-and-validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Check out main so we can commit the PDF back to assets/ after release.
      # Default checkout would land in detached-HEAD on the tag commit.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          name: starter-kit-pdf
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/upcj-starter-kit.pdf
          generate_release_notes: true

      # Sync the released PDF to assets/ on main so the inline preview in
      # preview.html (served from Pages) stays in sync with the latest tag.
      # The push only touches assets/upcj-starter-kit.pdf, which is outside
      # the workflow's path filter (starter-kit/**, framework/**, the
      # workflow file itself) — no infinite loop.
      - name: Publish PDF to Pages (assets/upcj-starter-kit.pdf)
        run: |
          set -euo pipefail
          cp dist/upcj-starter-kit.pdf assets/upcj-starter-kit.pdf
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/upcj-starter-kit.pdf
          if git diff --staged --quiet; then
            echo "PDF unchanged from main; nothing to commit."
          else
            git commit -m "chore: publish ${GITHUB_REF_NAME} PDF to Pages

          Auto-committed by the starter-kit release workflow so the inline
          preview at preview.html stays in sync with the tagged artifact."
            git push origin HEAD:main
          fi
