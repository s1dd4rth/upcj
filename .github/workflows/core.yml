name: core

on:
  push:
    branches: [main]
    paths: ["spec/**", "engine/**", "framework/**", ".github/workflows/core.yml"]
    tags: ["core-v*"]
  pull_request:
    paths: ["spec/**", "engine/**", "framework/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: engine/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Verify bundled spec hash matches canonical
        run: |
          BUNDLED_HASH=$(node -e "import('./dist/index.js').then(m => console.log(m.getSpecHash()))")
          CANONICAL_HASH=$(node -e "import('./scripts/compute-spec-hash.mjs').then(m => console.log(m.computeSpecHash('${{ github.workspace }}/spec')))")
          if [ "$BUNDLED_HASH" != "$CANONICAL_HASH" ]; then
            echo "Spec hash drift detected: bundled=$BUNDLED_HASH canonical=$CANONICAL_HASH" >&2
            exit 1
          fi
          echo "spec hash $BUNDLED_HASH"

  release:
    if: startsWith(github.ref, 'refs/tags/core-v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
