<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starter kit preview — UPCJ</title>
    <style>
        :root {
            --black: #0b0c0c;
            --white: #ffffff;
            --link: #1d70b8;
            --light-grey: #f3f2f1;
            --mid-grey: #b1b4b6;
            --dark-grey: #505a5f;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: var(--font);
            color: var(--black);
            background: var(--light-grey);
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            background: var(--black);
            color: var(--white);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .toolbar__title { font-size: 16px; font-weight: 700; }
        .toolbar__title a { color: var(--white); text-decoration: none; border-bottom: 1px dotted var(--mid-grey); }
        .toolbar__actions { display: flex; gap: 10px; }
        .btn {
            background: var(--white);
            color: var(--black);
            border: 0;
            padding: 8px 16px;
            font: inherit;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover, .btn:focus { background: var(--light-grey); }
        .btn--ghost { background: transparent; color: var(--white); border: 1px solid var(--white); }
        .btn--ghost:hover, .btn--ghost:focus { background: var(--white); color: var(--black); }
        .frame {
            flex: 1;
            border: 0;
            width: 100%;
            background: var(--mid-grey);
        }
        .fallback {
            padding: 30px 20px;
            text-align: center;
            font-size: 16px;
            color: var(--dark-grey);
        }
        .fallback a { color: var(--link); }
    </style>
</head>
<body>
    <header class="toolbar" role="banner">
        <div class="toolbar__title">
            <a href="index.html#starter-kit">← UPCJ Starter Kit</a>
        </div>
        <div class="toolbar__actions">
            <button class="btn" type="button" id="print-btn">Print</button>
            <a class="btn btn--ghost" id="download-btn" href="#" download="upcj-starter-kit.pdf">Download PDF</a>
        </div>
    </header>

    <iframe class="frame" id="pdf-frame" title="UPCJ Patient Starter Kit — PDF preview"></iframe>

    <noscript>
        <p class="fallback">JavaScript is disabled. <a href="https://github.com/s1dd4rth/upcj/releases/latest/download/upcj-starter-kit.pdf">Download the PDF</a>.</p>
    </noscript>

    <script>
        (function () {
            // Self-hosted on Pages so the iframe renders the PDF inline in
            // every browser (Safari respects Content-Disposition: attachment
            // even in iframes; GitHub Releases sends that header, Pages does
            // not). The Download button still goes to the canonical Release
            // URL so users always get the latest published artifact.
            var PDF_URL = "assets/upcj-starter-kit.pdf";
            var DOWNLOAD_URL = "https://github.com/s1dd4rth/upcj/releases/latest/download/upcj-starter-kit.pdf";
            var params = new URLSearchParams(window.location.search);
            var page = parseInt(params.get("page"), 10);
            if (!Number.isFinite(page) || page < 1) page = 1;

            // The #page=N fragment is honored by Chrome, Safari, Firefox, Edge
            // built-in PDF viewers (and pdf.js).
            var frameSrc = PDF_URL + "#page=" + page + "&toolbar=1&view=FitH";
            document.getElementById("pdf-frame").src = frameSrc;
            document.getElementById("download-btn").href = DOWNLOAD_URL;

            document.getElementById("print-btn").addEventListener("click", function () {
                var f = document.getElementById("pdf-frame");
                try {
                    f.contentWindow.focus();
                    f.contentWindow.print();
                } catch (e) {
                    // Some browsers block cross-origin print(). Fall back to opening
                    // the PDF in a new tab where the user can use the browser's
                    // native print menu.
                    window.open(PDF_URL + "#page=" + page, "_blank");
                }
            });
        })();
    </script>
</body>
</html>
